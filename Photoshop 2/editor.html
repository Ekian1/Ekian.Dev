<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ekian.dev — Image Editor</title>
    <meta name="description" content="ekian.dev — Free, professional image editor for YouTube thumbnails and more. No install, runs in your browser.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&family=Poppins:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&family=Bebas+Neue&family=Bangers&family=Permanent+Marker&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ============ MENU BAR ============ -->
    <header id="menu-bar">
        <div class="menu-logo">
            <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit" title="Back to Projects">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="2" width="20" height="20" rx="4" fill="url(#logoGrad)"/>
                    <path d="M7 12h10M12 7v10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                    <defs><linearGradient id="logoGrad" x1="2" y1="2" x2="22" y2="22"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#2563eb"/></linearGradient></defs>
                </svg>
                <span>ekian.dev</span>
            </a>
        </div>
        <nav class="menu-items">
            <div class="menu-item" data-menu="file">
                <span>File</span>
                <div class="menu-dropdown" id="menu-file">
                    <button data-action="back-home">← Back to Projects</button>
                    <div class="menu-separator"></div>
                    <button data-action="new-canvas">New Canvas <kbd>Ctrl+N</kbd></button>
                    <button data-action="open-file">Open Image <kbd>Ctrl+O</kbd></button>
                    <div class="menu-separator"></div>
                    <button data-action="save-project">Save Project <kbd>Ctrl+S</kbd></button>
                    <button data-action="load-project">Load Project</button>
                    <div class="menu-separator"></div>
                    <button data-action="export-png">Export as PNG <kbd>Ctrl+Shift+E</kbd></button>
                    <button data-action="export-jpeg">Export as JPEG</button>
                </div>
            </div>
            <div class="menu-item" data-menu="edit">
                <span>Edit</span>
                <div class="menu-dropdown" id="menu-edit">
                    <button data-action="undo">Undo <kbd>Ctrl+Z</kbd></button>
                    <button data-action="redo">Redo <kbd>Ctrl+Shift+Z</kbd></button>
                    <div class="menu-separator"></div>
                    <button data-action="select-all">Select All <kbd>Ctrl+A</kbd></button>
                    <button data-action="deselect">Deselect <kbd>Ctrl+D</kbd></button>
                    <div class="menu-separator"></div>
                    <button data-action="copy-selection">Copy <kbd>Ctrl+C</kbd></button>
                    <button data-action="paste-clipboard">Paste <kbd>Ctrl+V</kbd></button>
                    <button data-action="cut-selection">Cut <kbd>Ctrl+X</kbd></button>
                    <div class="menu-separator"></div>
                    <button data-action="clear-canvas">Clear Canvas</button>
                </div>
            </div>
            <div class="menu-item" data-menu="image">
                <span>Image</span>
                <div class="menu-dropdown" id="menu-image">
                    <button data-action="resize-canvas">Canvas Size</button>
                    <button data-action="resize-image">Image Size</button>
                    <div class="menu-separator"></div>
                    <button data-action="flip-h">Flip Horizontal</button>
                    <button data-action="flip-v">Flip Vertical</button>
                    <button data-action="rotate-cw">Rotate 90° CW</button>
                    <button data-action="rotate-ccw">Rotate 90° CCW</button>
                </div>
            </div>
            <div class="menu-item" data-menu="filter">
                <span>Filter</span>
                <div class="menu-dropdown" id="menu-filter">
                    <button data-action="filter-brightness">Brightness / Contrast</button>
                    <button data-action="filter-hsl">Hue / Saturation</button>
                    <button data-action="filter-levels">Levels</button>
                    <div class="menu-separator"></div>
                    <button data-action="filter-blur">Gaussian Blur</button>
                    <button data-action="filter-sharpen">Sharpen</button>
                    <button data-action="filter-noise">Add Noise</button>
                    <div class="menu-separator"></div>
                    <button data-action="filter-invert">Invert Colors</button>
                    <button data-action="filter-grayscale">Grayscale</button>
                    <button data-action="filter-sepia">Sepia</button>
                    <div class="menu-separator"></div>
                    <button data-action="filter-dropshadow">Drop Shadow</button>
                    <button data-action="filter-outerglow">Outer Glow</button>
                    <button data-action="filter-smoothcolors">Smooth Colors</button>
                    <button data-action="filter-chromakey">Chroma Key (BG Remove)</button>
                </div>
            </div>
            <div class="menu-item" data-menu="view">
                <span>View</span>
                <div class="menu-dropdown" id="menu-view">
                    <button data-action="zoom-in">Zoom In <kbd>Ctrl+=</kbd></button>
                    <button data-action="zoom-out">Zoom Out <kbd>Ctrl+-</kbd></button>
                    <button data-action="zoom-fit">Fit to Screen <kbd>Ctrl+0</kbd></button>
                    <button data-action="zoom-100">100% <kbd>Ctrl+1</kbd></button>
                    <div class="menu-separator"></div>
                    <button data-action="toggle-rulers">Toggle Rulers</button>
                    <button data-action="toggle-grid">Toggle Grid</button>
                </div>
            </div>
            <div class="menu-item" data-menu="templates">
                <span>Templates</span>
                <div class="menu-dropdown" id="menu-templates">
                    <button data-action="template-yt-thumbnail">YouTube Thumbnail (1280×720)</button>
                    <button data-action="template-yt-banner">YouTube Banner (2560×1440)</button>
                    <button data-action="template-instagram">Instagram Post (1080×1080)</button>
                    <button data-action="template-twitter">Twitter Header (1500×500)</button>
                    <button data-action="template-1080p">Full HD (1920×1080)</button>
                </div>
            </div>
        </nav>
        <div class="menu-right">
            <span id="zoom-display">100%</span>
            <span id="canvas-size-display">1280 × 720</span>
            <span id="cursor-pos">0, 0</span>
        </div>
    </header>

    <div id="app-container">
        <!-- ============ TOOLBAR (LEFT) ============ -->
        <aside id="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="move" title="Move (V)">
                    <svg viewBox="0 0 24 24"><path d="M5 9l4-4 4 4M9 5v14M15 19l4-4-4-4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="hand" title="Hand / Pan (H)">
                    <svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 00-4 0v1M14 10V4a2 2 0 00-4 0v6M10 10V6a2 2 0 00-4 0v8c0 4.418 3.582 8 8 8h0a8 8 0 008-8v-4a2 2 0 00-4 0v3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-tool="rect-select" title="Rectangle Select (M)">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="4 2"/></svg>
                </button>
                <button class="tool-btn" data-tool="ellipse-select" title="Ellipse Select">
                    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="7" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="4 2"/></svg>
                </button>
                <button class="tool-btn" data-tool="lasso" title="Lasso (L)">
                    <svg viewBox="0 0 24 24"><path d="M12 18c-4.418 0-8-2.686-8-6s3.582-6 8-6 8 2.686 8 6c0 1.657-1.04 3.156-2.7 4.24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="17" cy="18" r="3" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </button>
                <button class="tool-btn" data-tool="magic-wand" title="Magic Wand (W)">
                    <svg viewBox="0 0 24 24"><path d="M15 4l-1 3-3 1 3 1 1 3 1-3 3-1-3-1-1-3zM4 20l8-8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-tool="crop" title="Crop (C)">
                    <svg viewBox="0 0 24 24"><path d="M6 2v4H2M6 6h12v12h4M18 22v-4h4M18 18H6V6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="transform" title="Free Transform (Ctrl+T)">
                    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" stroke="currentColor" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/><rect x="2" y="2" width="4" height="4" fill="currentColor" rx="1"/><rect x="18" y="2" width="4" height="4" fill="currentColor" rx="1"/><rect x="2" y="18" width="4" height="4" fill="currentColor" rx="1"/><rect x="18" y="18" width="4" height="4" fill="currentColor" rx="1"/><rect x="10" y="2" width="4" height="4" fill="currentColor" rx="1"/><rect x="10" y="18" width="4" height="4" fill="currentColor" rx="1"/><rect x="2" y="10" width="4" height="4" fill="currentColor" rx="1"/><rect x="18" y="10" width="4" height="4" fill="currentColor" rx="1"/></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-tool="brush" title="Brush (B)">
                    <svg viewBox="0 0 24 24"><path d="M18.37 2.63a2.12 2.12 0 013 3L14 13l-4 1 1-4 7.37-7.37zM9 15c-3 1-5 3-5 5 2 0 4-2 5-5z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="pencil" title="Pencil (P)">
                    <svg viewBox="0 0 24 24"><path d="M17 3l4 4L7 21H3v-4L17 3z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                    <svg viewBox="0 0 24 24"><path d="M20 20H7l-3-3a2 2 0 010-2.83L14.17 4a2 2 0 012.83 0l4 4a2 2 0 010 2.83L11 21" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-tool="text" title="Text (T)">
                    <svg viewBox="0 0 24 24"><text x="5" y="19" font-family="Inter" font-weight="700" font-size="18" fill="currentColor">T</text></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-tool="rect-shape" title="Rectangle Shape (U)">
                    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </button>
                <button class="tool-btn" data-tool="ellipse-shape" title="Ellipse Shape">
                    <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="7" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </button>
                <button class="tool-btn" data-tool="line-shape" title="Line Tool">
                    <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="arrow-shape" title="Arrow Tool">
                    <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="14,4 20,4 20,10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group">
                <button class="tool-btn" data-tool="fill" title="Paint Bucket (G)">
                    <svg viewBox="0 0 24 24"><path d="M2.5 19.5l9-9 5 5-9 9-5-5zM7 15l-3 3M11 13L7 9l4.5-4.5 8 8" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 14s3 2.5 3 4.5a3 3 0 01-6 0c0-2 3-4.5 3-4.5z" fill="currentColor" opacity="0.5"/></svg>
                </button>
                <button class="tool-btn" data-tool="gradient" title="Gradient Tool">
                    <svg viewBox="0 0 24 24"><defs><linearGradient id="gradIcon"><stop offset="0" stop-color="currentColor"/><stop offset="1" stop-color="currentColor" stop-opacity="0.1"/></linearGradient></defs><rect x="3" y="3" width="18" height="18" rx="2" fill="url(#gradIcon)"/></svg>
                </button>
                <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
                    <svg viewBox="0 0 24 24"><path d="M20.35 5.65a2.5 2.5 0 00-3.54 0l-1.41 1.41-1.06-1.06-1.41 1.41 7.07 7.07 1.41-1.41-1.06-1.06 1.41-1.41M12.93 7.44L5.36 15a2 2 0 00-.57 1.1l-.8 4 4-.8a2 2 0 001.1-.57l7.57-7.57" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="tool-separator"></div>
            <div class="tool-group color-pickers">
                <div class="color-swatch-stack">
                    <div class="color-swatch bg-color" id="bg-color-swatch" title="Background Color" style="background:#ffffff"></div>
                    <div class="color-swatch fg-color" id="fg-color-swatch" title="Foreground Color" style="background:#000000"></div>
                </div>
                <button class="tool-btn small swap-colors" title="Swap Colors (X)">
                    <svg viewBox="0 0 24 24"><path d="M7 16l-4-4 4-4M17 8l4 4-4 4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </aside>

        <!-- ============ TOOL OPTIONS BAR ============ -->
        <div id="tool-options-bar">
            <!-- Brush options -->
            <div class="tool-option-group" data-for="brush pencil eraser">
                <label>Size</label>
                <input type="range" id="brush-size" min="1" max="200" value="10">
                <span class="opt-val" id="brush-size-val">10</span>
            </div>
            <div class="tool-option-group" data-for="brush pencil eraser">
                <label>Opacity</label>
                <input type="range" id="brush-opacity" min="1" max="100" value="100">
                <span class="opt-val" id="brush-opacity-val">100%</span>
            </div>
            <div class="tool-option-group" data-for="brush">
                <label>Hardness</label>
                <input type="range" id="brush-hardness" min="0" max="100" value="80">
                <span class="opt-val" id="brush-hardness-val">80%</span>
            </div>
            <!-- Text options -->
            <div class="tool-option-group" data-for="text">
                <label>Font</label>
                <select id="text-font">
                    <option value="Inter">Inter</option>
                    <option value="Outfit">Outfit</option>
                    <option value="Roboto">Roboto</option>
                    <option value="Poppins">Poppins</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Oswald">Oswald</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Bangers">Bangers</option>
                    <option value="Permanent Marker">Permanent Marker</option>
                    <option value="Press Start 2P">Press Start 2P</option>
                    <option value="Arial">Arial</option>
                    <option value="Impact">Impact</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Courier New">Courier New</option>
                </select>
            </div>
            <div class="tool-option-group" data-for="text">
                <label>Size</label>
                <input type="number" id="text-size" min="8" max="500" value="72" style="width:60px">
            </div>
            <div class="tool-option-group" data-for="text">
                <label>Weight</label>
                <select id="text-weight">
                    <option value="400">Regular</option>
                    <option value="500">Medium</option>
                    <option value="600">Semibold</option>
                    <option value="700" selected>Bold</option>
                    <option value="800">ExtraBold</option>
                    <option value="900">Black</option>
                </select>
            </div>
            <div class="tool-option-group" data-for="text">
                <button class="opt-btn" id="text-italic" title="Italic"><i>I</i></button>
            </div>
            <div class="tool-option-group" data-for="text">
                <label>Outline</label>
                <input type="number" id="text-outline" min="0" max="20" value="0" style="width:50px">
                <input type="color" id="text-outline-color" value="#000000">
            </div>
            <div class="tool-option-group" data-for="text">
                <label>Shadow</label>
                <input type="checkbox" id="text-shadow-toggle">
                <input type="color" id="text-shadow-color" value="#000000">
            </div>
            <div class="tool-option-group" data-for="text">
                <label>Glow</label>
                <input type="checkbox" id="text-glow-toggle">
                <input type="color" id="text-glow-color" value="#ffff00">
            </div>
            <!-- Shape options -->
            <div class="tool-option-group" data-for="rect-shape ellipse-shape line-shape arrow-shape">
                <label>Fill</label>
                <input type="checkbox" id="shape-fill-toggle" checked>
            </div>
            <div class="tool-option-group" data-for="rect-shape ellipse-shape line-shape arrow-shape">
                <label>Stroke</label>
                <input type="range" id="shape-stroke-width" min="0" max="20" value="2">
                <span class="opt-val" id="shape-stroke-val">2px</span>
            </div>
            <!-- Fill tolerance -->
            <div class="tool-option-group" data-for="fill">
                <label>Tolerance</label>
                <input type="range" id="fill-tolerance" min="0" max="255" value="32">
                <span class="opt-val" id="fill-tolerance-val">32</span>
            </div>
            <!-- Magic wand tolerance -->
            <div class="tool-option-group" data-for="magic-wand">
                <label>Tolerance</label>
                <input type="range" id="wand-tolerance" min="0" max="255" value="32">
                <span class="opt-val" id="wand-tolerance-val">32</span>
            </div>
            <!-- Gradient options -->
            <div class="tool-option-group" data-for="gradient">
                <label>Type</label>
                <select id="gradient-type">
                    <option value="linear">Linear</option>
                    <option value="radial">Radial</option>
                </select>
            </div>
            <div class="tool-option-group" data-for="gradient">
                <label>Color 2</label>
                <input type="color" id="gradient-color2" value="#ffffff">
            </div>
        </div>

        <!-- ============ MAIN WORKSPACE ============ -->
        <main id="workspace">
            <!-- Rulers -->
            <div id="ruler-h" class="ruler"></div>
            <div id="ruler-v" class="ruler"></div>
            <div id="ruler-corner"></div>
            <!-- Canvas Viewport -->
            <div id="canvas-viewport">
                <div id="canvas-container">
                    <canvas id="main-canvas"></canvas>
                    <canvas id="overlay-canvas"></canvas>
                </div>
            </div>
        </main>

        <!-- ============ RIGHT PANEL ============ -->
        <aside id="right-panel">
            <!-- Color Picker Panel -->
            <div class="panel" id="color-panel">
                <div class="panel-header">
                    <span>Color</span>
                    <button class="panel-toggle">−</button>
                </div>
                <div class="panel-body">
                    <div id="color-picker-area">
                        <canvas id="color-picker-sv" width="200" height="150"></canvas>
                        <canvas id="color-picker-hue" width="200" height="16"></canvas>
                        <canvas id="color-picker-alpha" width="200" height="16"></canvas>
                    </div>
                    <div class="color-inputs">
                        <div class="color-input-row">
                            <label>Hex</label>
                            <input type="text" id="color-hex" value="#000000" maxlength="7">
                        </div>
                        <div class="color-input-row">
                            <label>R</label><input type="number" id="color-r" min="0" max="255" value="0">
                            <label>G</label><input type="number" id="color-g" min="0" max="255" value="0">
                            <label>B</label><input type="number" id="color-b" min="0" max="255" value="0">
                        </div>
                        <div class="color-input-row">
                            <label>A</label><input type="range" id="color-alpha" min="0" max="100" value="100" style="flex:1"><span id="color-alpha-val">100%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Layers Panel -->
            <div class="panel" id="layers-panel">
                <div class="panel-header">
                    <span>Layers</span>
                    <button class="panel-toggle">−</button>
                </div>
                <div class="panel-body">
                    <div class="layer-controls">
                        <select id="blend-mode">
                            <option value="source-over">Normal</option>
                            <option value="multiply">Multiply</option>
                            <option value="screen">Screen</option>
                            <option value="overlay">Overlay</option>
                            <option value="darken">Darken</option>
                            <option value="lighten">Lighten</option>
                            <option value="color-dodge">Color Dodge</option>
                            <option value="color-burn">Color Burn</option>
                            <option value="hard-light">Hard Light</option>
                            <option value="soft-light">Soft Light</option>
                            <option value="difference">Difference</option>
                            <option value="exclusion">Exclusion</option>
                            <option value="hue">Hue</option>
                            <option value="saturation">Saturation</option>
                            <option value="color">Color</option>
                            <option value="luminosity">Luminosity</option>
                        </select>
                        <div class="layer-opacity-row">
                            <label>Opacity</label>
                            <input type="range" id="layer-opacity" min="0" max="100" value="100">
                            <span id="layer-opacity-val">100%</span>
                        </div>
                    </div>
                    <div id="layer-list"></div>
                    <div class="layer-actions">
                        <button id="btn-add-layer" title="New Layer">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        </button>
                        <button id="btn-duplicate-layer" title="Duplicate Layer">
                            <svg viewBox="0 0 24 24" width="16" height="16"><rect x="8" y="8" width="12" height="12" rx="1" stroke="currentColor" stroke-width="2" fill="none"/><path d="M4 16V5a1 1 0 011-1h11" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                        </button>
                        <button id="btn-merge-down" title="Merge Down">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 3v14M6 13l6 6 6-6M4 21h16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        <button id="btn-delete-layer" title="Delete Layer">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                        </button>
                        <button id="btn-move-layer-up" title="Move Up">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        <button id="btn-move-layer-down" title="Move Down">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M19 12l-7 7-7-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- History Panel -->
            <div class="panel" id="history-panel">
                <div class="panel-header">
                    <span>History</span>
                    <button class="panel-toggle">−</button>
                </div>
                <div class="panel-body">
                    <div id="history-list"></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- ============ MODALS ============ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">Dialog</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- ============ DROP ZONE ============ -->
    <div id="drop-zone">
        <div class="drop-zone-content">
            <svg viewBox="0 0 24 24" width="64" height="64"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <p>Drop image here to add as layer</p>
        </div>
    </div>

    <!-- Text editing overlay -->
    <textarea id="text-edit-overlay" spellcheck="false"></textarea>

    <script src="storage.js"></script>
    <script src="app.js"></script>
    <script src="tools.js"></script>
    <script src="filters.js"></script>
    <script src="ui.js"></script>
</body>
</html>
